version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'vitest'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      i18n:
        patterns:
          - 'i18next*'
          - 'react-i18next'
    ignore:
      - dependency-name: 'eslint'
        versions: ['>=10']
      - dependency-name: '@eslint/js'
        versions: ['>=10']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
